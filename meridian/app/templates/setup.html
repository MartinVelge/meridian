<!doctype html>
<title>Setup Model</title>
<h1>Setup Model</h1>
{% if error %}<p style="color:red">{{ error }}</p>{% endif %}
<form method="post">
  <label>Response:
    <select name="response">
      {% for col in columns %}
        <option value="{{ col }}">{{ col }}</option>
      {% endfor %}
    </select>
  </label>
  <h3>Features</h3>
  {% for col in columns %}
    <label><input type="checkbox" name="features" value="{{ col }}"> {{ col }}</label><br>
  {% endfor %}
  <p><button type="submit">Run Model</button></p>
</form>
